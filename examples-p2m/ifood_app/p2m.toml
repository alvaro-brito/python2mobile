[project]
name = "ifood_app"
version = "0.1.0"
entry = "main.py"

[build]
target = ["android", "ios", "flutter", "react-native"]
generator = "flutter"
llm_provider = "openai"
llm_model = "gpt-4o"
output_dir = "./build"
cache = true

[devserver]
port = 3003
hot_reload = true
mobile_frame = true

[style]
system = "tailwind"
